{% extends "base.html" %}
{% block content %}
<h1>Network Device Backup Dashboard</h1>
<h2>Devices ({{ devices|length }})</h2>
<table border="1">
    <tr>
        <th>Name</th>
        <th>Host</th>
        <th>Type</th>
        <th>Status</th>
    </tr>
    {% for device in devices %}
    <tr>
        <td>{{ device.name }}</td>
        <td>{{ device.host }}</td>
        <td>{{ device.device_type }}</td>
        <td>Pending</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
