{% extends "base.html" %}
{% block content %}
<h1>Device Inventory</h1>
<table border="1">
    <tr>
        <th>Name</th>
        <th>Host</th>
        <th>Device Type</th>
    </tr>
    {% for device in devices %}
    <tr>
        <td>{{ device.name }}</td>
        <td>{{ device.host }}</td>
        <td>{{ device.device_type }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
